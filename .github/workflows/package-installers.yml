name: Package Installers

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend-thin:
    name: Backend thin package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Build thin backend artifact
        run: uv run pyinstaller --noconfirm backend-thin.spec

      - name: Upload thin backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-thin
          path: dist/sing-attune-backend-thin/
