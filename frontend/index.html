<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sing-attune</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      padding: 10px 20px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.1rem; color: #e94560; }
    #status {
      font-size: 0.8rem;
      color: #aaa;
      margin-left: auto;
    }
    #status.ok      { color: #4caf50; }
    #status.error   { color: #e94560; }
    #status.loading { color: #ffa726; }

    #error-banner {
      display: none;
      background: #4a1f2a;
      border-bottom: 1px solid #e94560;
      color: #ffd0d8;
      padding: 8px 20px;
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    #error-banner.visible {
      display: block;
    }

    /* ── Headphone warning banner ── */
    #headphone-warning {
      background: #7b3f00;
      border-bottom: 1px solid #e65100;
      padding: 6px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
      color: #ffe0b2;
      flex-shrink: 0;
    }
    #headphone-warning.hidden { display: none; }
    #headphone-warning span { flex: 1; }
    #warning-dismiss {
      background: none;
      border: 1px solid #e65100;
      color: #ffe0b2;
      border-radius: 3px;
      padding: 2px 8px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    #warning-dismiss:hover { background: rgba(230,81,0,0.3); }

    /* ── Toolbar ── */
    #toolbar {
      padding: 8px 20px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .transport-btn {
      padding: 5px 18px;
      border: 1px solid #0f3460;
      border-radius: 4px;
      background: #0f3460;
      color: #eee;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .transport-btn:hover:not(:disabled) { background: #1a5276; }
    .transport-btn:disabled { opacity: 0.4; cursor: default; }

    .toolbar-divider {
      width: 1px;
      height: 24px;
      background: #0f3460;
      margin: 0 4px;
    }

    /* Part selector */
    #part-select,
    #transpose-select {
      background: #0f3460;
      color: #eee;
      border: 1px solid #0f3460;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 0.85rem;
      cursor: pointer;
    }
    #part-select:disabled,
    #transpose-select:disabled { opacity: 0.4; cursor: default; }

    /* Tempo slider */
    .tempo-group {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: #aaa;
    }
    #tempo-slider {
      width: 80px;
      accent-color: #e94560;
    }
    #tempo-label { min-width: 36px; color: #eee; font-size: 0.8rem; }

    /* Score info */
    #score-info {
      font-size: 0.8rem;
      color: #aaa;
      margin-left: 4px;
    }

    /* ── Main content area ── */
    main {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* Drop zone — shown before a score is loaded */
    #drop-zone {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      border: 2px dashed #0f3460;
      margin: 24px;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      color: #555;
    }
    #drop-zone.drag-over {
      border-color: #e94560;
      background: rgba(233, 69, 96, 0.05);
      color: #e94560;
    }
    #drop-zone.hidden { display: none; }
    #drop-zone p    { font-size: 0.9rem; }
    #drop-zone span { font-size: 0.75rem; }

    /* Score container — OSMD renders here */
    #score-container {
      position: absolute;
      inset: 0;
      overflow-x: auto;
      overflow-y: auto;
      padding: 16px;
      background: #fff;   /* OSMD renders on white */
    }

    #score-loading {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
      background: rgba(26, 26, 46, 0.65);
      z-index: 20;
      color: #eee;
      font-size: 0.9rem;
    }

    #score-loading.visible {
      display: flex;
    }

    #score-loading::before {
      content: '';
      width: 28px;
      height: 28px;
      border: 3px solid rgba(255, 255, 255, 0.25);
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 900px) {
      #toolbar {
        gap: 8px;
      }

      #score-info {
        width: 100%;
        margin-left: 0;
      }

      .toolbar-divider {
        display: none;
      }
    }

    #file-input { display: none; }
  </style>
</head>
<body>

  <header>
    <h1>sing-attune</h1>
    <span id="status">checking backend…</span>
  </header>

  <div id="error-banner" role="alert"></div>

  <!-- Headphone warning: shown every time Play is pressed -->
  <div id="headphone-warning" class="hidden">
    <span>🎧 Use headphones — speakers cause mic bleed and will break pitch detection.</span>
    <button id="warning-dismiss">Dismiss</button>
  </div>

  <div id="toolbar">
    <button id="btn-play"  class="transport-btn">▶ Play</button>
    <button id="btn-pause" class="transport-btn">⏸ Pause</button>
    <button id="btn-stop"  class="transport-btn">⏹ Stop</button>
    <button id="btn-rewind" class="transport-btn">⏮ Rewind</button>

    <div class="toolbar-divider"></div>

    <label for="part-select" style="font-size:0.8rem;color:#aaa;">Part:</label>
    <select id="part-select"></select>
    <label for="show-accompaniment" style="font-size:0.8rem;color:#aaa;">
      <input id="show-accompaniment" type="checkbox" />
      Show accompaniment
    </label>

    <div class="toolbar-divider"></div>


    <div class="toolbar-divider"></div>

    <label for="transpose-select" style="font-size:0.8rem;color:#aaa;">Transpose:</label>
    <select id="transpose-select">
      <option value="-12">-12</option>
      <option value="-11">-11</option>
      <option value="-10">-10</option>
      <option value="-9">-9</option>
      <option value="-8">-8</option>
      <option value="-7">-7</option>
      <option value="-6">-6</option>
      <option value="-5">-5</option>
      <option value="-4">-4</option>
      <option value="-3">-3</option>
      <option value="-2">-2</option>
      <option value="-1">-1</option>
      <option value="0" selected>0</option>
      <option value="1">+1</option>
      <option value="2">+2</option>
      <option value="3">+3</option>
      <option value="4">+4</option>
      <option value="5">+5</option>
      <option value="6">+6</option>
      <option value="7">+7</option>
      <option value="8">+8</option>
      <option value="9">+9</option>
      <option value="10">+10</option>
      <option value="11">+11</option>
      <option value="12">+12</option>
    </select>

    <div class="tempo-group">
      <label for="tempo-slider">Tempo:</label>
      <input id="tempo-slider" type="range" min="50" max="150" value="100" step="5" />
      <span id="tempo-label">100%</span>
    </div>

    <button id="btn-browse" class="transport-btn">Browse…</button>

    <span id="score-info"></span>
  </div>

  <main>
    <div id="score-loading" aria-live="polite">Loading score…</div>
    <div id="drop-zone">
      <p>Drop a MusicXML file here</p>
      <span>.xml or .mxl — or click to browse</span>
    </div>
    <div id="score-container"></div>
  </main>

  <input type="file" id="file-input" accept=".mxl,.xml" />
  <script type="module" src="/src/main.ts"></script>

</body>
</html>
